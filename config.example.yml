# ---------------------------------------------------------------------------
# Crypto Research Watchlist — example configuration.
# Copy to config.yml and edit. config.yml is the source of truth at runtime.
# ---------------------------------------------------------------------------

universe:
  symbols:
    - BTC-USD
    - ETH-USD
    - SOL-USD
    - BNB-USD
    - XRP-USD
    - ADA-USD
    - AVAX-USD
    - DOT-USD
    - LINK-USD
    - MATIC-USD
  sectors:
    L1:        [BTC-USD, ETH-USD, SOL-USD, BNB-USD, AVAX-USD, ADA-USD, DOT-USD]
    payments:  [XRP-USD]
    oracle:    [LINK-USD]
    layer2:    [MATIC-USD]
  exclude_stablecoins: true
  exclude_meme: true
  min_market_cap_usd: 1_000_000_000

scoring:
  weights:
    momentum: 0.35
    volatility_regime: 0.20
    rel_strength_vs_btc: 0.20
    funding_signal: 0.10
    drawdown_penalty: 0.15
  thresholds:
    strong: 72
    watchlist: 55
    avoid: 40

risk_limits:
  max_portfolio_weight_single_name: 0.30
  high_vol_threshold_annual: 1.20
  review_drawdown_pct: 0.25
  max_concurrent_positions: 2

aggressive:
  chase_trap_5d_pct: 0.30
  chase_trap_1d_pct: 0.18
  momentum_lookback_days: 60
  rotation_rank_drop: 3
  rotation_score_gap: 15.0
  drift_floor_pt: 8.0
  cooldown_after_chase_trap_days: 3

backtesting:
  benchmarks: [BTC-USD, ETH-USD]
  cross_asset: [SPY]
  macro: [^VIX]
  holding_periods_days: [1, 7, 21, 63]
  transaction_cost_bps: 10
  slippage_bps: 8

data_sources:
  market_data_order: [yfinance, ccxt]
  funding_rate_order: [ccxt]
  no_paid_apis: true

reports:
  reports_dir: reports
  save_markdown: true
  top_n_terminal: 10

scheduler:
  enabled: false

portfolio:
  total_capital_usd: 5000
  cash_available_usd: 5000
  currency: USD
  mode: aggressive
  target_total_positions: 1
  min_suggested_weight: 0.05

notifications:
  terminal: true
  telegram: false

llm:
  enabled: false
