name: Daily watchlist + Telegram

# Daily run of the candidates pipeline. Sends the ranked watchlist to
# Telegram and commits the markdown + JSON report back to main. Mirrors
# the pattern used by stock_research_watchlist (uv install, env from
# repo secrets, fail loud).
#
# Schedule: 08:00 UTC daily (= 09:00 London BST, 08:00 London GMT).

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-watchlist
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package
        run: uv pip install --system -e .

      - name: Run pipeline + send Telegram
        env:
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DATABASE_URL: sqlite:///crypto_research_watchlist.db
          PAPER_TRADING: '1'
        run: |
          python -m crypto_research_watchlist run --send-telegram

      - name: Commit report back to main
        run: |
          git config user.email "senna.semakula@gmail.com"
          git config user.name "Senna Semakula-Buuza"
          git add reports/watchlist_*.md reports/watchlist_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no report changes"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "daily watchlist: ${DATE}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail loud on any error
        if: failure()
        run: |
          echo "::error::Daily watchlist run failed."
          exit 1
