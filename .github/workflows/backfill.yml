name: Daily parquet backfill

# Refreshes the last 7 days of OHLCV in data/historical/prices_daily.parquet
# and commits it back to main. Runs at 07:30 UTC, 30 minutes before
# daily.yml at 08:00 UTC, so the daily watchlist always uses fresh prices.
#
# Designed to stay under 60s by fetching only an incremental window
# (--incremental flag in scripts/research/backfill_history.py).

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backfill-parquet
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install package
        run: uv pip install --system -e .

      - name: Refresh parquet (last 7 days)
        run: |
          python scripts/research/backfill_history.py --incremental

      - name: Commit refreshed parquet
        run: |
          git config user.email "senna.semakula@gmail.com"
          git config user.name "Senna Semakula-Buuza"
          git add data/historical/prices_daily.parquet 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no parquet changes"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "data: refresh parquet (incremental ${DATE})"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Fail loud on any error
        if: failure()
        run: |
          echo "::error::Daily parquet backfill failed."
          exit 1
